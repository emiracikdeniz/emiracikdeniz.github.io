<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>trefanya</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0b0e1a;
            color: #e0f2fe;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Animated Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0b0e1a;
        }
        .neon-glow {
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 40px #0f0;
        }
        .neon-blue {
            text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
        }

        /* Ticker */
        #ticker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ff1493;
            color: #fff;
            padding: 6px 0;
            z-index: 9999;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: 0 0 20px #ff1493;
            font-weight: bold;
            font-size: 1.1rem;
        }
        #ticker span {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 25s linear infinite;
        }
        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-200%); }
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
        }
        #login-screen h1 {
            font-size: 4rem;
            color: #0f0;
            text-shadow: 0 0 30px #0f0;
            margin-bottom: 30px;
            letter-spacing: 5px;
        }
        #login-screen input {
            padding: 12px 20px;
            margin: 8px;
            border: 2px solid #0f0;
            border-radius: 30px;
            background: transparent;
            color: #0f0;
            font-size: 1.1rem;
            width: 280px;
            outline: none;
            transition: 0.3s;
        }
        #login-screen input:focus {
            box-shadow: 0 0 20px #0f0;
        }
        #login-screen button {
            padding: 12px 40px;
            border: none;
            border-radius: 30px;
            background: #0f0;
            color: #0b0e1a;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        #login-screen button:hover {
            box-shadow: 0 0 30px #0f0;
            transform: scale(1.05);
        }
        #login-error {
            color: #ff4444;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Main App */
        #app {
            display: none;
            padding: 60px 20px 20px;
            max-width: 1200px;
            margin: auto;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 10px 0;
            border-bottom: 2px solid #0f0;
            margin-bottom: 30px;
        }
        header h1 {
            color: #0f0;
            font-size: 2.5rem;
            text-shadow: 0 0 20px #0f0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .user-info span {
            color: #00d4ff;
            font-weight: bold;
        }
        .user-info button {
            background: #ff1493;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }
        .user-info button:hover {
            opacity: 0.8;
        }

        /* Admin Panel */
        #admin-panel {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #0f0;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: none;
        }
        #admin-panel h3 {
            color: #ff1493;
            margin-bottom: 15px;
        }
        .admin-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .admin-grid input, .admin-grid textarea, .admin-grid select {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #0f0;
            background: #111;
            color: #e0f2fe;
            flex: 1 1 200px;
        }
        .admin-grid button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-grid button:hover {
            box-shadow: 0 0 20px #0f0;
        }

        /* Posts */
        #posts {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
        }
        .post {
            background: rgba(0, 255, 0, 0.03);
            border-left: 4px solid #0f0;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        .post h2 {
            color: #0f0;
            font-size: 1.6rem;
        }
        .post-meta {
            color: #00d4ff;
            font-size: 0.85rem;
            margin: 5px 0 12px;
        }
        .post-body {
            margin: 10px 0;
            line-height: 1.5;
        }
        .post-actions {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .post-actions button {
            background: transparent;
            border: none;
            color: #0f0;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .post-actions button:hover {
            text-shadow: 0 0 15px #0f0;
            transform: scale(1.1);
        }
        .post-actions .like-btn.liked {
            color: #ff1493;
        }
        .comment-section {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        .comment-section input {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #0f0;
            background: #111;
            color: #e0f2fe;
            width: 70%;
            margin-right: 10px;
        }
        .comment-section button {
            background: #00d4ff;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }
        .comment-list {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .comment-item {
            border-bottom: 1px solid #333;
            padding: 6px 0;
            font-size: 0.9rem;
        }
        .comment-item strong {
            color: #00d4ff;
        }

        /* Poll */
        #poll-section {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00d4ff;
            border-radius: 16px;
            padding: 20px;
            margin: 30px 0;
        }
        #poll-section h3 {
            color: #00d4ff;
        }
        .poll-option {
            display: block;
            margin: 8px 0;
            cursor: pointer;
        }
        .poll-option input {
            margin-right: 10px;
        }
        #poll-result {
            margin-top: 10px;
            font-weight: bold;
            color: #0f0;
        }

        /* AI Assistant */
        #ai-assistant {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
        }
        #ai-toggle {
            background: #0f0;
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-size: 2rem;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 30px #0f0;
            transition: 0.3s;
        }
        #ai-toggle:hover {
            transform: scale(1.1);
        }
        #ai-box {
            display: none;
            background: #111;
            border: 2px solid #0f0;
            border-radius: 16px;
            padding: 15px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            position: absolute;
            bottom: 80px;
            right: 0;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3);
        }
        #ai-box .ai-msg {
            margin: 5px 0;
            padding: 8px;
            border-radius: 10px;
            background: #1a1f2e;
        }
        #ai-box .ai-msg.user {
            background: #0f0;
            color: #000;
            text-align: right;
        }
        #ai-box input {
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #0f0;
            background: #0b0e1a;
            color: #e0f2fe;
            margin-top: 8px;
        }
        #ai-box .voice-btn {
            background: #00d4ff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Badges */
        .badge {
            display: inline-block;
            background: #ff1493;
            color: #fff;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 3px;
        }
        .badge-earned {
            background: #0f0;
            color: #000;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #login-screen h1 { font-size: 2.5rem; }
            header h1 { font-size: 1.8rem; }
            .admin-grid input, .admin-grid textarea { flex: 1 1 100%; }
            #ai-box { width: 260px; right: -20px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0e1a; }
        ::-webkit-scrollbar-thumb { background: #0f0; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Ticker -->
    <div id="ticker"><span id="ticker-text">✨ Hoş geldiniz trefanya'ya! Neon pembe haber şeridi ✨</span></div>

    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Login Screen -->
    <div id="login-screen">
        <h1>trefanya</h1>
        <input type="text" id="login-user" placeholder="Kullanıcı Adı" />
        <input type="password" id="login-pass" placeholder="Şifre" />
        <button id="login-btn">Giriş Yap</button>
        <button id="register-btn" style="background:#00d4ff; margin-top:5px;">Kayıt Ol</button>
        <div id="login-error"></div>
    </div>

    <!-- Main App -->
    <div id="app">

        <header>
            <h1>trefanya</h1>
            <div class="user-info">
                <span id="current-user">Misafir</span>
                <span id="badge-display"></span>
                <button id="logout-btn">Çıkış</button>
            </div>
        </header>

        <!-- Admin Panel -->
        <div id="admin-panel">
            <h3>👑 Admin Paneli</h3>
            <div class="admin-grid">
                <input type="text" id="post-title" placeholder="Başlık" />
                <textarea id="post-content" placeholder="İçerik" rows="2"></textarea>
                <input type="file" id="post-file" />
                <button id="add-post-btn">➕ Gönderi Ekle</button>
                <input type="text" id="ticker-input" placeholder="Yeni şerit metni" />
                <button id="update-ticker-btn">🔄 Şerit Güncelle</button>
                <select id="week-user-select"><option value="">Haftanın Üyesi Seç</option></select>
                <button id="set-week-user-btn">⭐ Seç</button>
                <div style="flex:1 1 100%;">
                    <input type="text" id="poll-question" placeholder="Anket sorusu" />
                    <input type="text" id="poll-options" placeholder="Seçenekler (virgülle)" />
                    <button id="create-poll-btn">📊 Anket Oluştur</button>
                </div>
            </div>
        </div>

        <!-- Poll -->
        <div id="poll-section">
            <h3 id="poll-question-display">Anket yok</h3>
            <div id="poll-options-container"></div>
            <div id="poll-result"></div>
        </div>

        <!-- Posts -->
        <div id="posts"></div>

        <!-- AI Assistant -->
        <div id="ai-assistant">
            <button id="ai-toggle">🤖</button>
            <div id="ai-box">
                <div id="ai-messages"><div class="ai-msg">Merhaba, ben Niko! Nasıl yardımcı olabilirim?</div></div>
                <input type="text" id="ai-input" placeholder="Mesaj yaz..." />
                <button class="voice-btn" id="ai-voice-btn">🎤</button>
            </div>
        </div>

    </div>

    <script>
        // ------------------------------------------------------------------
        // DATA LAYER (LocalStorage as "database")
        // ------------------------------------------------------------------
        const DB = {
            get(key, def) {
                try { return JSON.parse(localStorage.getItem('trefanya_'+key)) || def; } catch { return def; }
            },
            set(key, val) {
                localStorage.setItem('trefanya_'+key, JSON.stringify(val));
            }
        };

        // Initialize
        if (!DB.get('users', null)) {
            DB.set('users', { 'emir': 'qazwsxedc' });
        }
        if (!DB.get('posts', null)) {
            DB.set('posts', []);
        }
        if (!DB.get('comments', null)) {
            DB.set('comments', {});
        }
        if (!DB.get('likes', null)) {
            DB.set('likes', {});
        }
        if (!DB.get('badges', null)) {
            DB.set('badges', {});
        }
        if (!DB.get('ticker', null)) {
            DB.set('ticker', '✨ Hoş geldiniz trefanya\'ya! Neon pembe haber şeridi ✨');
        }
        if (!DB.get('poll', null)) {
            DB.set('poll', { question: 'Anket yok', options: [], votes: {} });
        }
        if (!DB.get('weekUser', null)) {
            DB.set('weekUser', null);
        }

        // ------------------------------------------------------------------
        // STATE
        // ------------------------------------------------------------------
        let currentUser = null;
        let isAdmin = false;
        let aiKey = 'AQ.Ab8RN6L_3jwAEFV13X96VcxMXdPvZI8-2n1hEQX_rLuLqqleYw'; // Google AI Studio key

        // ------------------------------------------------------------------
        // DOM REFS
        // ------------------------------------------------------------------
        const loginScreen = document.getElementById('login-screen');
        const app = document.getElementById('app');
        const loginUser = document.getElementById('login-user');
        const loginPass = document.getElementById('login-pass');
        const loginError = document.getElementById('login-error');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const currentUserSpan = document.getElementById('current-user');
        const badgeDisplay = document.getElementById('badge-display');
        const adminPanel = document.getElementById('admin-panel');
        const postsDiv = document.getElementById('posts');
        const tickerSpan = document.getElementById('ticker-text');

        // Admin inputs
        const postTitle = document.getElementById('post-title');
        const postContent = document.getElementById('post-content');
        const postFile = document.getElementById('post-file');
        const addPostBtn = document.getElementById('add-post-btn');
        const tickerInput = document.getElementById('ticker-input');
        const updateTickerBtn = document.getElementById('update-ticker-btn');
        const weekUserSelect = document.getElementById('week-user-select');
        const setWeekUserBtn = document.getElementById('set-week-user-btn');
        const pollQuestion = document.getElementById('poll-question');
        const pollOptions = document.getElementById('poll-options');
        const createPollBtn = document.getElementById('create-poll-btn');

        // Poll
        const pollQuestionDisplay = document.getElementById('poll-question-display');
        const pollOptionsContainer = document.getElementById('poll-options-container');
        const pollResult = document.getElementById('poll-result');

        // AI
        const aiToggle = document.getElementById('ai-toggle');
        const aiBox = document.getElementById('ai-box');
        const aiMessages = document.getElementById('ai-messages');
        const aiInput = document.getElementById('ai-input');
        const aiVoiceBtn = document.getElementById('ai-voice-btn');

        // ------------------------------------------------------------------
        // LOGIN / REGISTER
        // ------------------------------------------------------------------
        function login(username, password) {
            const users = DB.get('users', {});
            if (users[username] && users[username] === password) {
                currentUser = username;
                isAdmin = (username === 'emir');
                loginScreen.style.display = 'none';
                app.style.display = 'block';
                currentUserSpan.textContent = username;
                if (isAdmin) adminPanel.style.display = 'block';
                else adminPanel.style.display = 'none';
                updateBadges();
                renderAll();
                populateWeekUserSelect();
                return true;
            }
            return false;
        }

        loginBtn.addEventListener('click', () => {
            const u = loginUser.value.trim();
            const p = loginPass.value.trim();
            if (!u || !p) { loginError.textContent = 'Kullanıcı adı ve şifre gerekli.'; return; }
            if (login(u, p)) {
                loginError.textContent = '';
            } else {
                loginError.textContent = 'Hatalı giriş!';
            }
        });

        registerBtn.addEventListener('click', () => {
            const u = loginUser.value.trim();
            const p = loginPass.value.trim();
            if (!u || !p) { loginError.textContent = 'Kullanıcı adı ve şifre gerekli.'; return; }
            const users = DB.get('users', {});
            if (users[u]) { loginError.textContent = 'Bu kullanıcı zaten var.'; return; }
            users[u] = p;
            DB.set('users', users);
            loginError.textContent = 'Kayıt başarılı! Giriş yapabilirsiniz.';
            loginUser.value = '';
            loginPass.value = '';
        });

        logoutBtn.addEventListener('click', () => {
            currentUser = null;
            isAdmin = false;
            app.style.display = 'none';
            loginScreen.style.display = 'flex';
            currentUserSpan.textContent = 'Misafir';
            adminPanel.style.display = 'none';
        });

        // ------------------------------------------------------------------
        // RENDER POSTS
        // ------------------------------------------------------------------
        function renderPosts() {
            const posts = DB.get('posts', []);
            const comments = DB.get('comments', {});
            const likes = DB.get('likes', {});
            postsDiv.innerHTML = '';
            if (!posts.length) {
                postsDiv.innerHTML = '<p style="text-align:center;color:#888;">Henüz gönderi yok.</p>';
                return;
            }
            // Ters sırala (en yeni önce)
            for (let i = posts.length-1; i >= 0; i--) {
                const p = posts[i];
                const pid = p.id;
                const comms = comments[pid] || [];
                const likeCount = likes[pid] ? likes[pid].count || 0 : 0;
                const userLiked = likes[pid] && likes[pid].users && likes[pid].users.includes(currentUser);

                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <h2>${p.title || 'Başlıksız'}</h2>
                    <div class="post-meta">${p.author || 'Anonim'} • ${new Date(p.date).toLocaleString()}</div>
                    ${p.file ? `<div><img src="${p.file}" style="max-width:100%;max-height:200px;border-radius:8px;"/></div>` : ''}
                    <div class="post-body">${p.content || ''}</div>
                    <div class="post-actions">
                        <button class="like-btn ${userLiked?'liked':''}" data-pid="${pid}"><i class="fas fa-heart"></i> ${likeCount}</button>
                        <button class="comment-toggle" data-pid="${pid}"><i class="fas fa-comment"></i> Yorumlar (${comms.length})</button>
                        ${isAdmin ? `<button class="delete-post" data-pid="${pid}" style="color:#ff4444;"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                    <div class="comment-section" id="comment-section-${pid}" style="display:none;">
                        <input type="text" placeholder="Yorum yaz..." class="comment-input" data-pid="${pid}" />
                        <button class="comment-submit" data-pid="${pid}">Gönder</button>
                        <div class="comment-list" id="comment-list-${pid}">
                            ${comms.map(c => `<div class="comment-item"><strong>${c.author}</strong>: ${c.text}</div>`).join('')}
                        </div>
                    </div>
                `;
                postsDiv.appendChild(div);
            }

            // Event listeners
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const pid = this.dataset.pid;
                    if (!currentUser) { alert('Lütfen giriş yapın.'); return; }
                    toggleLike(pid);
                });
            });

            document.querySelectorAll('.comment-toggle').forEach(btn => {
                btn.addEventListener('click', function() {
                    const pid = this.dataset.pid;
                    const section = document.getElementById(`comment-section-${pid}`);
                    section.style.display = section.style.display === 'none' ? 'block' : 'none';
                });
            });

            document.querySelectorAll('.comment-submit').forEach(btn => {
                btn.addEventListener('click', function() {
                    const pid = this.dataset.pid;
                    const input = document.querySelector(`.comment-input[data-pid="${pid}"]`);
                    const text = input.value.trim();
                    if (!text || !currentUser) return;
                    addComment(pid, text);
                    input.value = '';
                });
            });

            document.querySelectorAll('.delete-post').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (confirm('Bu gönderiyi silmek istediğinize emin misiniz?')) {
                        deletePost(this.dataset.pid);
                    }
                });
            });
        }

        // ------------------------------------------------------------------
        // POST CRUD
        // ------------------------------------------------------------------
        function addPost(title, content, fileData) {
            const posts = DB.get('posts', []);
            const id = Date.now().toString(36) + Math.random().toString(36).substr(2,5);
            posts.push({
                id,
                title: title || 'Başlıksız',
                content: content || '',
                author: currentUser || 'Anonim',
                date: Date.now(),
                file: fileData || null
            });
            DB.set('posts', posts);
            renderAll();
            checkBadges();
        }

        function deletePost(pid) {
            let posts = DB.get('posts', []);
            posts = posts.filter(p => p.id !== pid);
            DB.set('posts', posts);
            renderAll();
        }

        // ------------------------------------------------------------------
        // LIKES
        // ------------------------------------------------------------------
        function toggleLike(pid) {
            const likes = DB.get('likes', {});
            if (!likes[pid]) likes[pid] = { count: 0, users: [] };
            const idx = likes[pid].users.indexOf(currentUser);
            if (idx > -1) {
                likes[pid].users.splice(idx, 1);
                likes[pid].count--;
            } else {
                likes[pid].users.push(currentUser);
                likes[pid].count++;
            }
            DB.set('likes', likes);
            renderPosts();
        }

        // ------------------------------------------------------------------
        // COMMENTS
        // ------------------------------------------------------------------
        function addComment(pid, text) {
            const comments = DB.get('comments', {});
            if (!comments[pid]) comments[pid] = [];
            comments[pid].push({ author: currentUser, text, date: Date.now() });
            DB.set('comments', comments);
            renderPosts();
            checkBadges();
        }

        // ------------------------------------------------------------------
        // TICKER
        // ------------------------------------------------------------------
        function updateTicker(text) {
            DB.set('ticker', text);
            tickerSpan.textContent = text;
        }

        // ------------------------------------------------------------------
        // POLL
        // ------------------------------------------------------------------
        function renderPoll() {
            const poll = DB.get('poll', { question: 'Anket yok', options: [], votes: {} });
            pollQuestionDisplay.textContent = poll.question || 'Anket yok';
            pollOptionsContainer.innerHTML = '';
            pollResult.textContent = '';
            if (!poll.options || !poll.options.length) {
                pollOptionsContainer.innerHTML = '<p>Henüz anket yok.</p>';
                return;
            }
            const totalVotes = Object.values(poll.votes).reduce((a,b) => a+b, 0);
            poll.options.forEach(opt => {
                const label = document.createElement('label');
                label.className = 'poll-option';
                const count = poll.votes[opt] || 0;
                const pct = totalVotes ? Math.round((count/totalVotes)*100) : 0;
                label.innerHTML = `<input type="radio" name="poll-vote" value="${opt}" /> ${opt} (${count} oy, %${pct})`;
                pollOptionsContainer.appendChild(label);
            });
            const voteBtn = document.createElement('button');
            voteBtn.textContent = 'Oy Ver';
            voteBtn.style.background = '#0f0';
            voteBtn.style.border = 'none';
            voteBtn.style.padding = '8px 20px';
            voteBtn.style.borderRadius = '20px';
            voteBtn.style.fontWeight = 'bold';
            voteBtn.style.cursor = 'pointer';
            voteBtn.addEventListener('click', () => {
                const selected = document.querySelector('input[name="poll-vote"]:checked');
                if (!selected) { alert('Bir seçenek seçin.'); return; }
                if (!currentUser) { alert('Giriş yapın.'); return; }
                const poll = DB.get('poll', {});
                if (!poll.votes) poll.votes = {};
                poll.votes[selected.value] = (poll.votes[selected.value] || 0) + 1;
                DB.set('poll', poll);
                renderPoll();
                checkBadges();
            });
            pollOptionsContainer.appendChild(voteBtn);
        }

        function createPoll(question, optionsArr) {
            const poll = { question, options: optionsArr, votes: {} };
            DB.set('poll', poll);
            renderPoll();
        }

        // ------------------------------------------------------------------
        // BADGES
        // ------------------------------------------------------------------
        function checkBadges() {
            if (!currentUser) return;
            const badges = DB.get('badges', {});
            if (!badges[currentUser]) badges[currentUser] = [];
            const userBadges = badges[currentUser];
            const posts = DB.get('posts', []);
            const comments = DB.get('comments', {});
            const likes = DB.get('likes', {});
            let allComments = 0;
            for (let pid in comments) allComments += comments[pid].filter(c => c.author === currentUser).length;
            let allLikes = 0;
            for (let pid in likes) if (likes[pid].users.includes(currentUser)) allLikes++;

            const badgeList = [];
            if (posts.some(p => p.author === currentUser)) badgeList.push('📝 İlk Gönderi');
            if (allComments >= 3) badgeList.push('💬 Yorumcu');
            if (allLikes >= 5) badgeList.push('❤️ Beğenen');
            if (DB.get('weekUser', null) === currentUser) badgeList.push('⭐ Haftanın Üyesi');

            const newBadges = badgeList.filter(b => !userBadges.includes(b));
            if (newBadges.length) {
                userBadges.push(...newBadges);
                DB.set('badges', badges);
                updateBadges();
                alert(`🎉 Yeni rozet kazandınız: ${newBadges.join(', ')}`);
            }
        }

        function updateBadges() {
            if (!currentUser) return;
            const badges = DB.get('badges', {});
            const userBadges = badges[currentUser] || [];
            badgeDisplay.innerHTML = userBadges.map(b => `<span class="badge badge-earned">${b}</span>`).join(' ');
        }

        // ------------------------------------------------------------------
        // WEEK USER
        // ------------------------------------------------------------------
        function populateWeekUserSelect() {
            const users = DB.get('users', {});
            weekUserSelect.innerHTML = '<option value="">Haftanın Üyesi Seç</option>';
            for (let u in users) {
                const opt = document.createElement('option');
                opt.value = u;
                opt.textContent = u;
                weekUserSelect.appendChild(opt);
            }
            const current = DB.get('weekUser', null);
            if (current) weekUserSelect.value = current;
        }

        function setWeekUser(username) {
            DB.set('weekUser', username);
            populateWeekUserSelect();
            renderAll();
            checkBadges();
        }

        // ------------------------------------------------------------------
        // AI (Niko) - Google AI Studio
        // ------------------------------------------------------------------
        async function askAI(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${aiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Üzgünüm, bir hata oluştu.';
            } catch {
                return 'Bağlantı hatası. Lütfen tekrar deneyin.';
            }
        }

        aiToggle.addEventListener('click', () => {
            aiBox.style.display = aiBox.style.display === 'none' ? 'block' : 'none';
        });

        aiInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const msg = aiInput.value.trim();
                if (!msg) return;
                aiInput.value = '';
                addAIMessage(msg, 'user');
                const reply = await askAI(msg);
                addAIMessage(reply, 'ai');
            }
        });

        function addAIMessage(text, type) {
            const div = document.createElement('div');
            div.className = `ai-msg ${type}`;
            div.textContent = text;
            aiMessages.appendChild(div);
            aiMessages.scrollTop = aiMessages.scrollHeight;
        }

        // Voice
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'tr-TR';
            aiVoiceBtn.addEventListener('click', () => {
                recognition.start();
            });
            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                aiInput.value = transcript;
                addAIMessage(transcript, 'user');
                const reply = await askAI(transcript);
                addAIMessage(reply, 'ai');
            };
        } else {
            aiVoiceBtn.style.display = 'none';
        }

        // ------------------------------------------------------------------
        // RENDER ALL
        // ------------------------------------------------------------------
        function renderAll() {
            renderPosts();
            renderPoll();
            const ticker = DB.get('ticker', '✨ Hoş geldiniz trefanya\'ya! Neon pembe haber şeridi ✨');
            tickerSpan.textContent = ticker;
            updateBadges();
            populateWeekUserSelect();
        }

        // ------------------------------------------------------------------
        // BACKGROUND ANIMATION (Neon yeşil + mavi)
        // ------------------------------------------------------------------
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const count = 60;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 1,
                    dx: (Math.random() - 0.5) * 0.5,
                    dy: (Math.random() - 0.5) * 0.5,
                    color: Math.random() > 0.5 ? '#0f0' : '#00d4ff'
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.dx;
                    p.y += p.dy;
                    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 20;
                    ctx.fill();
                });
                // çizgiler
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i+1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = 'rgba(0,255,0,0.1)';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ------------------------------------------------------------------
        // EVENT LISTENERS (Admin)
        // ------------------------------------------------------------------
        addPostBtn.addEventListener('click', () => {
            const title = postTitle.value.trim();
            const content = postContent.value.trim();
            let fileData = null;
            if (postFile.files.length) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    fileData = e.target.result;
                    addPost(title, content, fileData);
                    postTitle.value = '';
                    postContent.value = '';
                    postFile.value = '';
                };
                reader.readAsDataURL(postFile.files[0]);
            } else {
                addPost(title, content, null);
                postTitle.value = '';
                postContent.value = '';
            }
        });

        updateTickerBtn.addEventListener('click', () => {
            const text = tickerInput.value.trim();
            if (text) {
                updateTicker(text);
                tickerInput.value = '';
            }
        });

        setWeekUserBtn.addEventListener('click', () => {
            const user = weekUserSelect.value;
            if (user) setWeekUser(user);
        });

        createPollBtn.addEventListener('click', () => {
            const question = pollQuestion.value.trim();
            const opts = pollOptions.value.split(',').map(s => s.trim()).filter(s => s);
            if (question && opts.length >= 2) {
                createPoll(question, opts);
                pollQuestion.value = '';
                pollOptions.value = '';
            } else {
                alert('Soru ve en az 2 seçenek girin.');
            }
        });

        // ------------------------------------------------------------------
        // INIT
        // ------------------------------------------------------------------
        initBackground();
        renderAll();

        // Check if already logged in (emir auto-login for demo)
        // Actually we keep login screen.
        // If you want auto-login as emir for testing, uncomment:
        // login('emir', 'qazwsxedc');

        console.log('🚀 trefanya hazır!');
    </script>
